          description: '**Expert option:** Specifies the threshold of how relevant must the recommended users be. Possible values one of: "low", "medium", "high".

            '
          enum:
          - low
          - medium
          - high
          type: string
        rotationRate:
          description: '**Expert option:** If your users browse the system in real-time, it may easily happen that you wish to offer them recommendations multiple times. Here comes the question: how much
            should the recommendations change? Should they remain the same, or should they rotate? Recombee API allows you to control this per request in a backward fashion. You may penalize a user for
            being recommended in the near past. For the specific user, `rotationRate=1` means maximal rotation, `rotationRate=0` means absolutely no rotation. You may also use, for example, `rotationRate=0.2`
            for only slight rotation of recommended users.

