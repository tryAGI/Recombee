          type: number
          format: double
        rotationTime:
          description: '**Expert option:** Taking *rotationRate* into account, specifies how long it takes for a user to recover from the penalization. For example, `rotationTime=7200.0` means that users
            recommended less than 2 hours ago are penalized.

