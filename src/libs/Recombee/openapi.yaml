openapi: 3.0.0
info:
  title: Recombee API
  description: "This is the documentation for Recombee Recommendation API (https://docs.recombee.com/api)\n    \nAuthentication details need to be provided with every request to Recombee API. Please refer\
    \ to [Authentication (HMAC) document](https://docs.recombee.com/authentication) for more information.\n"
  version: 4.1.0
paths:
  /{databaseId}/items/{itemId}:
    put:
      summary: Add Item
      description: 'Adds new item of the given `itemId` to the items catalog.


        All the item properties for the newly created items are set to null.

        '
      tags:
      - Items
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: itemId
        in: path
        description: ID of the item to be created.
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Successful operation.
        '400':
          description: The `itemId` does not match ^[a-zA-Z0-9_\-:@\.]+$.
        '409':
          description: The `itemId` is already present in the item catalog. In many cases, you may consider this code a success – it only tells you that nothing has been written to the database.
    delete:
      summary: Delete Item
      description: 'Deletes an item of the given `itemId` from the catalog.


        If there are any *purchases*, *ratings*, *bookmarks*, *cart additions*, or *detail views* of the item present in the database, they will be deleted in cascade as well. Also, if the item is present
        in some *series*, it will be removed from all the *series* where present.


        If an item becomes obsolete/no longer available, it is meaningful to keep it in the catalog (along with all the interaction data, which are very useful), and **only exclude the item from recommendations**.
        In such a case, use [ReQL filter](https://docs.recombee.com/reql) instead of deleting the item completely.

        '
      tags:
      - Items
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: itemId
        in: path
        description: ID of the item to be deleted.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
        '400':
          description: The `itemId` does not match ^[a-zA-Z0-9_\-:@\.]+$.
        '404':
          description: The `itemId` is not present in the item catalog. In many cases, you may consider this code a success – it only tells you that nothing has been deleted from the database since the
            item was already not present. If there is no additional info in the JSON response, you probably have an error in your URL.
    post:
      summary: Set Item Values
      description: 'Sets/updates (some) property values of the given item. The properties (columns) must be previously created by [Add item property](https://docs.recombee.com/api#add-item-property).

        '
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: itemId
        in: path
        description: 'ID of the item which will be modified.

          '
        required: true
        schema:
          type: string
      - name: cascadeCreate
        in: query
        description: Sets whether the item should be created if not present in the database.
        required: false
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: string
        description: "The values for the individual properties.\n\nExample of the body:\n```json\n  {\n    \"product_description\": \"4K TV with 3D feature\",\n    \"categories\":   [\"Electronics\", \"\
          Televisions\"],\n    \"price_usd\": 342,\n    \"in_stock_from\": \"2016-11-16T08:00Z\",\n    \"image\": \"http://myexamplesite.com/products/4ktelevision3d/image.jpg\",\n    \"other_images\": [\"\
          http://myexamplesite.com/products/4ktelevision3d/image2.jpg\",\n                     \"http://myexamplesite.com/products/4ktelevision3d/image3.jpg\"]\n  }\n```\nSet item values can also **cascade\
          \ create** the item if it's not already present in the database.\n\nFor this functionality:\n\n* *When using the client libraries*:\n  Set the optional *cascadeCreate* parameter to true, just\
          \ like when creating an interaction.\n\n* *When using directly REST API*: Set special \"property\" `!cascadeCreate`.\n\n  Example:\n  ```json\n    {\n      \"product_description\": \"4K TV with\
          \ 3D feature\",\n      \"!cascadeCreate\": true\n    }\n  ```\n\n  Note the exclamation mark (!) at the beginning of the parameter's name to distinguish it from item property names.\n"
        required: true
      responses:
        '200':
          description: Successful operation.
        '400':
          description: 'Property name does not match ''''^[a-zA-Z0-9_\-:]+$'''', value does not match the property type.

            '
        '404':
          description: 'Property of the given name is not present in the database. If there is no additional info in the JSON response, you probably have an error in your URL.

            '
    get:
      summary: Get Item Values
      description: 'Gets all the current property values of the given item.

        '
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: itemId
        in: path
        description: 'ID of the item whose properties are to be obtained.

          '
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                response:
                  value:
                    release-date: null
                    tags:
                    - electronics
                    - laptops
                    num-processors: 12
                    description: Very powerful laptop
                    weight: 1.6
        '400':
          description: The *itemId* does not match ^[a-zA-Z0-9_\-:@\.]+$
        '404':
          description: 'Item of the given *itemId* is not present in the catalog. If there is no additional info in the JSON response, you probably have an error in your URL.

            '
  /{databaseId}/items/list/:
    get:
      summary: List Items
      description: Gets a list of IDs of items currently present in the catalog.
      tags:
      - Items
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: filter
        in: query
        description: Boolean-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to filter items to be listed. Only the items for which the expression is *true* will be returned.
        required: false
        schema:
          type: string
      - name: count
        in: query
        description: The number of items to be listed.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: Specifies the number of items to skip (ordered by `itemId`).
        required: false
        schema:
          type: integer
      - name: returnProperties
        in: query
        description: "With `returnProperties=true`, property values of the listed items are returned along with their IDs in a JSON dictionary. \n\nExample response:\n```json\n  [\n    {\n      \"itemId\"\
          : \"tv-178\",\n      \"description\": \"4K TV with 3D feature\",\n      \"categories\":   [\"Electronics\", \"Televisions\"],\n      \"price\": 342,\n      \"url\": \"myshop.com/tv-178\"\n   \
          \ },\n    {\n      \"itemId\": \"mixer-42\",\n      \"description\": \"Stainless Steel Mixer\",\n      \"categories\":   [\"Home & Kitchen\"],\n      \"price\": 39,\n      \"url\": \"myshop.com/mixer-42\"\
          \n    }\n  ]\n```\n"
        required: false
        schema:
          type: boolean
      - name: includedProperties
        in: query
        description: "Allows specifying which properties should be returned when `returnProperties=true` is set. The properties are given as a comma-separated list.\n\nExample response for `includedProperties=description,price`:\n\
          ```json\n  [\n    {\n      \"itemId\": \"tv-178\",\n      \"description\": \"4K TV with 3D feature\",\n      \"price\": 342\n    },\n    {\n      \"itemId\": \"mixer-42\",\n      \"description\"\
          : \"Stainless Steel Mixer\",\n      \"price\": 39\n    }\n  ]\n```\n"
        required: false
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
              examples:
                response:
                  value:
                  - item-1
                  - item-2
                  - item-3
        '404':
          description: If present, `filter` contains a non-existing item property.
  /{databaseId}/items/properties/{propertyName}:
    put:
      summary: Add Item Property
      description: 'Adding an item property is somewhat equivalent to adding a column to the table of items. The items may be characterized by various properties of different types.

        '
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: propertyName
        in: path
        description: 'Name of the item property to be created. Currently, the following names are reserved: `id`, `itemid`, case-insensitively. Also, the length of the property name must not exceed 63 characters.

          '
        required: true
        schema:
          type: string
      - name: type
        in: query
        description: "Value type of the item property to be created. One of: `int`, `double`, `string`, `boolean`, `timestamp`, `set`, `image` or `imageList`.\n\n* `int`- Signed integer number.\n\n* `double`\
          \ - Floating point number. It uses 64-bit base-2 format (IEEE 754 standard).\n\n* `string` - UTF-8 string.\n\n* `boolean` - *true* / *false*\n\n* `timestamp` - Value representing date and time.\n\
          \n* `set` - Set of strings.\n\n* `image` - URL of an image (`jpeg`, `png` or `gif`).\n\n* `imageList` - List of URLs that refer to images. \n"
        required: true
        schema:
          type: string
          enum:
          - int
          - double
          - string
          - boolean
          - timestamp
          - set
          - image
          - imageList
      responses:
        '201':
          description: Successful operation.
        '400':
          description: 'Property name does not match ^[a-zA-Z0-9_\-:]+$, or it is a reserved keyword (''''id'''', ''''itemid''''), or its length exceeds 63 characters. Type information is missing, or the
            given type is invalid.

            '
        '409':
          description: Property of the given name is already present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been written to the database.
    delete:
      summary: Delete Item Property
      description: 'Deleting an item property is roughly equivalent to removing a column from the table of items.

        '
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: propertyName
        in: path
        description: Name of the property to be deleted.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
        '400':
          description: Property name does not match ^[a-zA-Z0-9_\-:]+$.
        '404':
          description: Property of the given name is not present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been deleted from the database
            since the item property was already not present. If there is no additional info in the JSON response, you probably have an error in your URL.
    get:
      summary: Get Item Property Info
      description: 'Gets information about specified item property.

        '
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: propertyName
        in: path
        description: Name of the property about which the information is to be retrieved.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PropertyInfo'
              examples:
                response:
                  value:
                    name: num-processors
                    type: int
        '400':
          description: Property name does not match ^[a-zA-Z0-9_\-:]+$.
        '404':
          description: Property of the given name is not present in the database. If there is no additional info in the JSON response, you probably have an error in your URL.
  /{databaseId}/items/properties/list/:
    get:
      summary: List Item Properties
      description: 'Gets the list of all the item properties in your database.

        '
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PropertyInfo'
              examples:
                response:
                  value:
                  - name: tags
                    type: set
                  - name: release-date
                    type: timestamp
                  - name: description
                    type: string
        '404':
          description: Invalid URL.
  /{databaseId}/more-items/:
    post:
      summary: Update More Items
      description: "Updates (some) property values of all the items that pass the filter.\n\nExample: *Setting all the items that are older than a week as unavailable*\n\n  ```json\n    {\n      \"filter\"\
        : \"'releaseDate' < now() - 7*24*3600\",\n      \"changes\": {\"available\": false}\n    }\n  ```\n"
      tags:
      - Item Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMoreItemsParameters'
        description: 'Filter and changes in item properties.

          '
        required: true
      responses:
        '200':
          description: Successful operation. Returns IDs of updated items and their count.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateMoreItemsResponse'
              examples:
                response:
                  value:
                    itemIds:
                    - item-42
                    - item-125
                    - item-11
                    count: 3
        '400':
          description: 'Invalid filter, property name does not match ''''^[a-zA-Z0-9_\-:]+$'''', value does not match the property type.

            '
        '404':
          description: 'Property of the given name is not present in the database.

            '
    delete:
      summary: Delete More Items
      description: 'Deletes all the items that pass the filter.


        If an item becomes obsolete/no longer available, it is meaningful to **keep it in the catalog** (along with all the interaction data, which are very useful) and **only exclude the item from recommendations**.
        In such a case, use [ReQL filter](https://docs.recombee.com/reql) instead of deleting the item completely.'
      tags:
      - Items
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteMoreItemsParameters'
        description: "Example of the body:\n```json\n  {\n    \"filter\": \"'releaseDate' < now() - 7*24*3600\",\n  }\n"
        required: true
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteMoreItemsResponse'
              examples:
                response:
                  value:
                    itemIds:
                    - item-42
                    - item-125
                    - item-11
                    count: 3
        '400':
          description: 'Invalid filter.

            '
  /{databaseId}/series/{seriesId}:
    put:
      summary: Add Series
      description: Creates a new series in the database.
      tags:
      - Series
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: seriesId
        in: path
        description: ID of the series to be created.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSeries'
        description: "Example of the body:\n```json\n  {\n    \"cascadeCreate\": true\n  }\n```\n"
      responses:
        '201':
          description: Successful operation.
        '400':
          description: The `seriesId` does not match ^[a-zA-Z0-9_\-:@\.]+$.
        '409':
          description: Series of the given `seriesId` is already present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been written to the database.
    delete:
      summary: Delete Series
      description: 'Deletes the series of the given `seriesId` from the database.


        Deleting a series will only delete assignment of items to it, not the items themselves!

        '
      tags:
      - Series
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: seriesId
        in: path
        description: ID of the series to be deleted.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteSeries'
        description: "Example of the body:\n```json\n  {\n    \"cascadeCreate\": true\n  }\n```\n"
      responses:
        '200':
          description: Successful operation.
        '400':
          description: The `seriesId` does not match ^[a-zA-Z0-9_\-:@\.]+$.
        '404':
          description: Series of the given `seriesId` is not present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been deleted from the database
            since the series was already not present. If there is no additional info in the JSON response, you probably have an error in your URL.
  /{databaseId}/series/list/:
    get:
      summary: List Series
      description: Gets the list of all the series currently present in the database.
      tags:
      - Series
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Series'
              examples:
                response:
                  value:
                  - series-1
                  - series-2
                  - series-3
        '404':
          description: Invalid URL.
  /{databaseId}/series/{seriesId}/items/:
    get:
      summary: List Series Items
      description: Lists all the items present in the given series, sorted according to their time index values.
      tags:
      - Series
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: seriesId
        in: path
        description: ID of the series whose items are to be listed.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SeriesItem'
              examples:
                response:
                  value:
                  - itemType: item
                    itemId: item-x
                    time: 1
                  - itemType: item
                    itemId: item-y
                    time: 2
                  - itemType: item
                    itemId: item-z
                    time: 3
        '400':
          description: The `seriesId` does not match ^[a-zA-Z0-9_\-:@\.]+$.
        '404':
          description: Series of the given `seriesId` is not present in the database. If there is no additional info in the JSON response, you probably have an error in your URL.
    post:
      summary: Insert to Series
      description: 'Inserts an existing item/series into a series of the given seriesId at a position determined by time.

        '
      tags:
      - Series
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: seriesId
        in: path
        description: ID of the series to be inserted into.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeriesItem'
        description: "Description of the item and position in series\\n\\n\nExample of the body:\n```json\n  {\n    \"itemType\": \"series\",\n    \"itemId\": \"season-1\",\n    \"time\": 1\n  }\n```\n"
        required: true
      responses:
        '200':
          description: Successful operation.
        '400':
          description: '`seriesId` or `itemId` does not match ^[a-zA-Z0-9_\-:@\.]+$, or `itemType`∉{item,series}, or `time` is not a real number.

            '
        '404':
          description: 'Series of the given `seriesId` is not present in the database. Item of the given `itemId` is not present in the database if `itemType` is item. Series of the given `itemId` is not
            present in the database if `itemType` is series. If there is no additional info in the JSON response, you probably have an error in your URL.

            '
        '409':
          description: A series item of the exact same (`itemType`, `itemId`, `time`) is already present in the series of `seriesId`. In many cases, you may consider this code a success – it only tells
            you that nothing has been written to the database.
    delete:
      summary: Remove from Series
      description: Removes an existing series item from the series.
      tags:
      - Series
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: seriesId
        in: path
        description: ID of the series from which a series item is to be removed.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveSeriesItem'
        description: "Description of the item and position in series\\n\\n\nExample of the body:\n```json\n  {\n    \"itemType\": \"series\",\n    \"itemId\": \"season-1\"\n  }\n```\n"
        required: true
      responses:
        '200':
          description: Successful operation.
        '400':
          description: The `seriesId` or `itemId` does not match ^[a-zA-Z0-9_\-:@\.]+$ or `itemType`∉{`item`, `series`}.
        '404':
          description: Series of the given `seriesId` is not present in the database. Series item given by pair (`itemType`, `itemId`) is not present in series of `seriesId`. If there is no additional info
            in the JSON response, you probably have an error in your URL.
  /{databaseId}/users/{userId}:
    put:
      summary: Add User
      description: 'Adds a new user to the database.

        '
      tags:
      - Users
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: userId
        in: path
        description: ID of the user to be added.
        required: true
        schema:
          type: string
      responses:
        '201':
          description: Successful operation.
        '400':
          description: The `userId` does not match ^[a-zA-Z0-9_\-:@\.]+$.
        '409':
          description: User of the given userId is already present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been written to the database.
    delete:
      summary: Delete User
      description: 'Deletes a user of the given *userId* from the database.


        If there are any purchases, ratings, bookmarks, cart additions or detail views made by the user present in the database, they will be deleted in cascade as well.

        '
      tags:
      - Users
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: userId
        in: path
        description: ID of the user to be deleted.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
        '400':
          description: The *userId* does not match ''^[a-zA-Z0-9_\-:@\.]+$''.
        '404':
          description: User of the given `userId` is not present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been deleted from the database
            since the user was already not present. If there is no additional info in the JSON response, you probably have an error in your URL.
    post:
      summary: Set User Values
      description: 'Sets/updates (some) property values of the given user. The properties (columns) must be previously created by [Add user property](https://docs.recombee.com/api#add-user-property).

        '
      tags:
      - User Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: userId
        in: path
        description: 'ID of the user which will be modified.

          '
        required: true
        schema:
          type: string
      - name: cascadeCreate
        in: query
        description: Sets whether the user should be created if not present in the database.
        required: false
        schema:
          type: boolean
      requestBody:
        content:
          application/json:
            schema:
              type: string
        description: "The values for the individual properties.\n\nExample of the body:\n```json\n  {\n    \"country\": \"US\",\n    \"sex\": \"F\"\n  }\n```\nSet user values can also **cascade create**\
          \ the user if it's not already present in the database.\n\nFor this functionality:\n\n* *When using the client libraries*:\n  Set the optional *cascadeCreate* parameter to true, just like when\
          \ creating an interaction.\n\n* *When using directly REST API*: Set special \"property\" `!cascadeCreate`.\n\n  Example:\n  ```json\n    {\n      \"country\": \"US\",\n      \"!cascadeCreate\"\
          : true\n    }\n  ```\n\n  Note the exclamation mark (!) at the beginning of the parameter's name to distinguish it from item property names.\n"
        required: true
      responses:
        '200':
          description: Successful operation.
        '400':
          description: 'Property name does not match ''''^[a-zA-Z0-9_\-:]+$'''', value does not agree to property type.

            '
        '404':
          description: 'Property of the given name is not present in the database. If there is no additional info in the JSON response, you probably have an error in your URL.

            '
    get:
      summary: Get User Values
      description: 'Gets all the current property values of the given user.

        '
      tags:
