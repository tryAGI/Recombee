  /{databaseId}/recomms/composite/:
    post:
      summary: Composite Recommendation
      description: "Composite Recommendation returns both a *source entity* (e.g., an Item or [Item Segment](https://docs.recombee.com/segmentations.html)) and a list of related recommendations in a single\
        \ response.\n\nIt is ideal for use cases such as personalized homepage sections (*Articles from <category>*), *Because You Watched <movie>*, or *Artists Related to Your Favorite Artist <artist>*.\n\
        \nSee detailed **examples and configuration guidance** in the [Composite Scenarios documentation](https://docs.recombee.com/scenarios#composite-recommendations).\n\n**Structure**\n\nThe endpoint\
        \ operates in two stages:\n1. Recommends the *source* (e.g., an Item Segment or item) to the user.\n2. Recommends *results* (items or Item Segments) related to that *source*.\n\nFor example, *Articles\
        \ from <category>* can be decomposed into:\n  - [Recommend Item Segments To User](https://docs.recombee.com/api#recommend-item-segments-to-user) to find the category.\n  - [Recommend Items To Item\
        \ Segment](https://docs.recombee.com/api#recommend-items-to-item-segment) to recommend articles from that category.\n\nSince the first step uses [Recommend Item Segments To User](https://docs.recombee.com/api#recommend-items-to-user),\
        \ you must include the `userId` parameter in the *Composite Recommendation* request.\n\nEach *Composite Recommendation* counts as a single recommendation API request for billing.\n\n**Stage-specific\
        \ Parameters**\n\nAdditional parameters can be supplied via [sourceSettings](https://docs.recombee.com/api#composite-recommendation-param-sourceSettings) and [resultSettings](https://docs.recombee.com/api#composite-recommendation-param-resultSettings).\n\
        In the example above:\n  - `sourceSettings` may include any parameter valid for [Recommend Item Segments To User](https://docs.recombee.com/api#recommend-items-to-user) (e.g., `filter`, `booster`).\n\
        \  - `resultSettings` may include any parameter valid for [Recommend Items To Item Segment](https://docs.recombee.com/api#recommend-items-to-item-segment).\n\nSee [this example](https://docs.recombee.com/api#composite-recommendation-example-setting-parameters-for-individual-stages)\
        \ for more details.\n"
      tags:
      - Recommendations
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompositeRecommendationParameters'
        description: Recommendation parameters definition
        required: true
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompositeRecommendationResponse'
              examples:
                response:
                  value:
                    recommId: ee94fa8b-efe7-4b35-abc6-2bc3456d66ed
                    source:
                      id: category-4
                    recomms:
                    - id: item-64
                    - id: item-42
                    - id: item-23
                    numberNextRecommsCalls: 0
        '400':
          description: Count is not a positive integer, provided scenario not found.
        '404':
          description: contextSegmentId not found in the context segmentation, userId not found in the database and cascadeCreate is false, itemId not found in the database and cascadeCreate is false.
  /{databaseId}/search/users/{userId}/items/:
    post:
      summary: Search Items
      description: "Full-text personalized search. The results are based on the provided `searchQuery` and also on the user's past interactions (purchases, ratings, etc.) with the items (items more suitable\
        \ for the user are preferred in the results).\n\nAll the string and set item properties are indexed by the search engine.\n\nThis endpoint should be used in a search box on your website/app. It\
        \ can be called multiple times as the user is typing the query in order to get the most viable suggestions based on the current state of the query, or once after submitting the whole query. \n\n\
        The returned items are sorted by relevance (the first item being the most relevant).\n\nBesides the recommended items, also a unique `recommId` is returned in the response. It can be used to:\n\n\
        - Let Recombee know that this search was successful (e.g., user clicked one of the recommended items). See [Reported metrics](https://docs.recombee.com/admin_ui#reported-metrics).\n- Get subsequent\
        \ search results when the user scrolls down or goes to the next page. See [Recommend Next Items](https://docs.recombee.com/api#recommend-next-items).\n\nIt is also possible to use POST HTTP method\
        \ (for example in the case of a very long ReQL filter) - query parameters then become body parameters.\n"
      tags:
