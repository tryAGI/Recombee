      tags:
      - User Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: propertyName
        in: path
        description: Name of the property to be deleted.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
        '400':
          description: Property name does not match ^[a-zA-Z0-9_\-:]+$.
        '404':
          description: Property of the given name is not present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been deleted from the database
            since the user property was already not present. If there is no additional info in the JSON response, you probably have an error in your URL.
    get:
      summary: Get User Property Info
      description: 'Gets information about specified user property.

