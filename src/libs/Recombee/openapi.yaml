  /{databaseId}/recomms/users/{userId}/items/:
    post:
      summary: Recommend Items to User
      description: 'Based on the user''s past interactions (purchases, ratings, etc.) with the items, recommends top-N items that are most likely to be of high value for the given user.


        The most typical use cases are recommendations on the homepage, in some "Picked just for you" section, or in email.


        The returned items are sorted by relevance (the first item being the most relevant).


        Besides the recommended items, also a unique `recommId` is returned in the response. It can be used to:


        - Let Recombee know that this recommendation was successful (e.g., user clicked one of the recommended items). See [Reported metrics](https://docs.recombee.com/admin_ui#reported-metrics).

        - Get subsequent recommended items when the user scrolls down (*infinite scroll*) or goes to the next page. See [Recommend Next Items](https://docs.recombee.com/api#recommend-next-items).


        It is also possible to use POST HTTP method (for example in the case of a very long ReQL filter) - query parameters then become body parameters.

        '
      tags:
      - Recommendations
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: userId
        in: path
        description: ID of the user for whom personalized recommendations are to be generated.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendItemsToUserParameters'
        description: Recommendation parameters definition
        required: true
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
              examples:
                response:
                  value:
                    recommId: 3f6ad2f2-a3f1-4ba1-a690-f4f01f76d4eb
                    recomms:
                    - id: item-146
                    - id: item-462
                    - id: item-463
                    numberNextRecommsCalls: 0
        '400':
          description: userId does not match ^[a-zA-Z0-9_\-:@\.]+$, count is not a positive integer, filter or booster is not valid [ReQL](https://docs.recombee.com/reql) expressions, filter expression
            does not return boolean, booster does not return double or integer.
        '404':
          description: userId not found in the database and cascadeCreate is false. If there is no additional info in the JSON response, you probably have an error in your URL.
  /{databaseId}/recomms/items/{itemId}/items/:
    post:
      summary: Recommend Items to Item
      description: 'Recommends a set of items that are somehow related to one given item, *X*. A typical scenario is when the user *A* is viewing *X*. Then you may display items to the user that he might
        also be interested in. Recommend items to item request gives you Top-N such items, optionally taking the target user *A* into account.


        The returned items are sorted by relevance (the first item being the most relevant).


