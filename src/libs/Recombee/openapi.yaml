  /{databaseId}/batch/:
    post:
      summary: Batch
      description: 'Batch processing allows you to submit arbitrary sequence of requests within a single HTTPS request.


        Any type of request from the above documentation may be used in the Batch, and the Batch may combine different types of requests arbitrarily as well.


        Using Batch requests is beneficial for example, when synchronizing the catalog of items or uploading historical interaction data, as sending the data in Batch is considerably faster than sending
        the individual requests (thanks to optimizations and  reducing network and HTTPS overhead).

        '
      tags:
      - Miscellaneous
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Batch'
        description: Batch
        required: true
      responses:
        '200':
          description: Successful operation. There is an array with responses. The order of the responses in the array follows the order of the sent requests.
          content:
            application/json:
              examples:
                response:
                  value:
                  - code: 200
                    json: ok
                  - code: 200
                    json: ok
                  - code: 200
                    json:
                      recommId: 3f6ad2f2-a3f1-4ba1-a690-f4f01f76d4eb
                      recomms:
                      - id: item-146
                      - id: item-462
                      - id: item-463
                      numberNextRecommsCalls: 0
        '400':
          description: 'Many possibilities, see the error description in the result JSON. Examples: invalid or missing Content-type (not `application/json`), request body is not a valid JSON, request JSON
            does not have the prescribed structure.

            '
        '404':
          description: There is at least one request in the batch with an invalid (non-existing) URL. In such a case, the batch as a whole **is not executed** and you'll get HTTP 404, because the batch
            is apriori erroneous.
        '413':
          description: Too large batch (containing more than 10,000 requests in case of a server side request).
  /{databaseId}/scenarios/:
    get:
      summary: List Scenarios
      description: 'Get all [Scenarios](https://docs.recombee.com/scenarios) of the given database.

        '
      tags:
      - Miscellaneous
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                description: Array of existing Scenarios
                items:
                  $ref: '#/components/schemas/Scenario'
              examples:
                response:
                  value:
                  - id: relatedArticles
                    endpoint: recommendItemsToItem
                  - id: justForYou
                    endpoint: recommendItemsToUser
                  - id: homepageSectionsOrdering
                    endpoint: recommendItemSegmentsToUser
                  - id: homepageSectionContent
                    endpoint: recommendItemsToItemSegment
  /{databaseId}/:
    delete:
      summary: Reset Database
      description: 'Completely erases all your data, including items, item properties, series, user database, purchases, ratings, detail views, and bookmarks. Make sure the request is never executed in
        the production environment! Resetting your database is irreversible.

        '
      tags:
      - Miscellaneous
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
servers:
- url: https://rapi.recombee.com
  description: Recombee API (default region)
components:
  schemas:
    PropertyInfo:
      type: object
      required:
      - name
      - type
      properties:
        name:
          type: string
          description: Name of the property
        type:
          type: string
          description: Type of the property
    SeriesItem:
      type: object
      required:
      - itemType
      - itemId
      - time
      properties:
        itemType:
          type: string
          description: '`item` iff the regular item from the catalog is to be inserted, `series` iff series is inserted as the item.'
        itemId:
          type: string
          description: ID of the item iff `itemType` is `item`. ID of the series iff `itemType` is `series`.
        time:
          type: number
          format: double
          description: Time index used for sorting items in the series. According to time, items are sorted within series in ascending order. In the example of TV show episodes, the episode number is a
            natural choice to be passed as time.
        cascadeCreate:
          type: boolean
          description: Indicates that any non-existing entity specified within the request should be created (as if corresponding PUT requests were invoked). This concerns both the `seriesId` and the `itemId`.
            If `cascadeCreate` is set to true, the behavior also depends on the `itemType`. In case of `item`, an item is created, in case of `series` a series + corresponding item with the same ID is created.
    RemoveSeriesItem:
      type: object
      required:
      - itemType
      - itemId
      properties:
        itemType:
          type: string
          description: Type of the item to be removed.
        itemId:
          type: string
          description: ID of the item iff `itemType` is `item`. ID of the series iff `itemType` is `series`.
    AddSeries:
      type: object
      properties:
        cascadeCreate:
          type: boolean
          description: If set to `true`, the item will be created with the same ID as the series. Default is `true`.
    DeleteSeries:
      type: object
      properties:
        cascadeDelete:
          type: boolean
          description: If set to `true`, item with the same ID as seriesId will be also deleted. Default is `false`.
    DetailView:
      type: object
      required:
      - userId
      - itemId
      properties:
        userId:
          type: string
          description: User who viewed the item
        itemId:
          type: string
          description: Viewed item
        timestamp:
          format: double
          description: UTC timestamp of the view as ISO8601-1 pattern or UTC epoch time. The default value is the current time.
          oneOf:
          - type: string
          - type: number
        duration:
          type: integer
          description: Duration of the view
        cascadeCreate:
          type: boolean
          description: Sets whether the given user/item should be created if not present in the database.
        recommId:
          type: string
          description: If this detail view is based on a recommendation request, `recommId` is the id of the clicked recommendation.
        additionalData:
          type: object
          description: A dictionary of additional data for the interaction.
        autoPresented:
          type: boolean
          description: Indicates whether the item was automatically presented to the user (e.g., in a swiping feed) or explicitly requested by the user (e.g., by clicking on a link). Defaults to `false`.
    Purchase:
      type: object
      required:
      - userId
      - itemId
      properties:
        userId:
          type: string
          description: User who purchased the item
        itemId:
          type: string
          description: Purchased item
        timestamp:
          format: double
          description: UTC timestamp of the purchase as ISO8601-1 pattern or UTC epoch time. The default value is the current time.
          oneOf:
          - type: string
          - type: number
        cascadeCreate:
          type: boolean
          description: Sets whether the given user/item should be created if not present in the database.
        amount:
          type: number
          format: double
          description: Amount (number) of purchased items. The default is 1. For example, if `user-x` purchases two `item-y` during a single order (session...), the `amount` should equal 2.
        price:
          type: number
          format: double
          description: Price paid by the user for the item. If `amount` is greater than 1, the sum of prices of all the items should be given.
        profit:
          type: number
          format: double
          description: Your profit from the purchased item. The profit is natural in the e-commerce domain (for example, if `user-x` purchases `item-y` for $100 and the gross margin is 30 %, then the profit
            is $30) but is also applicable in other domains (for example, at a news company it may be income from a displayed advertisement on article page). If `amount` is greater than 1, the sum of profit
            of all the items should be given.
        recommId:
          type: string
          description: If this purchase is based on a recommendation request, `recommId` is the id of the clicked recommendation.
        additionalData:
          type: object
          description: A dictionary of additional data for the interaction.
    Rating:
      type: object
      required:
      - userId
      - itemId
      - rating
      properties:
        userId:
          type: string
          description: User who submitted the rating
        itemId:
          type: string
          description: Rated item
        timestamp:
          format: double
          description: UTC timestamp of the rating as ISO8601-1 pattern or UTC epoch time. The default value is the current time.
          oneOf:
          - type: string
          - type: number
        rating:
          type: number
          format: double
          description: Rating rescaled to interval [-1.0,1.0], where -1.0 means the worst rating possible, 0.0 means neutral, and 1.0 means absolutely positive rating. For example, in the case of 5-star
            evaluations, rating = (numStars-3)/2 formula may be used for the conversion.
        cascadeCreate:
          type: boolean
          description: Sets whether the given user/item should be created if not present in the database.
        recommId:
          type: string
          description: If this rating is based on a recommendation request, `recommId` is the id of the clicked recommendation.
        additionalData:
          type: object
          description: A dictionary of additional data for the interaction.
    CartAddition:
      type: object
      required:
      - userId
      - itemId
      properties:
        userId:
          type: string
          description: User who added the item to the cart
        itemId:
          type: string
          description: Item added to the cart
        timestamp:
          format: double
          description: UTC timestamp of the cart addition as ISO8601-1 pattern or UTC epoch time. The default value is the current time.
          oneOf:
          - type: string
          - type: number
        cascadeCreate:
          type: boolean
          description: Sets whether the given user/item should be created if not present in the database.
        amount:
          type: number
          format: double
          description: Amount (number) added to cart. The default is 1. For example, if `user-x` adds two `item-y` during a single order (session...), the `amount` should equal 2.
        price:
          type: number
          format: double
          description: Price of the added item. If `amount` is greater than 1, the sum of prices of all the items should be given.
        recommId:
          type: string
          description: If this cart addition is based on a recommendation request, `recommId` is the id of the clicked recommendation.
        additionalData:
          type: object
          description: A dictionary of additional data for the interaction.
    Bookmark:
      type: object
      required:
      - userId
      - itemId
      properties:
        userId:
          type: string
          description: User who bookmarked the item
        itemId:
          type: string
          description: Bookmarked item
        timestamp:
          format: double
          description: UTC timestamp of the bookmark as ISO8601-1 pattern or UTC epoch time. The default value is the current time.
          oneOf:
          - type: string
          - type: number
        cascadeCreate:
          type: boolean
          description: Sets whether the given user/item should be created if not present in the database.
        recommId:
          type: string
          description: If this bookmark is based on a recommendation request, `recommId` is the id of the clicked recommendation.
        additionalData:
          type: object
          description: A dictionary of additional data for the interaction.
    ViewPortion:
      type: object
      required:
      - userId
      - itemId
      - portion
      properties:
        userId:
          type: string
          description: User who viewed a portion of the item
        itemId:
          type: string
          description: Viewed item
        portion:
          type: number
          format: double
          description: Viewed portion of the item (number between 0.0 (viewed nothing) and 1.0 (viewed full item) ). It should be the actual viewed part of the item, no matter the seeking. For example,
            if the user seeked immediately to half of the item and then viewed 10% of the item, the `portion` should still be `0.1`.
        sessionId:
          type: string
          description: ID of the session in which the user viewed the item. Default is `null` (`None`, `nil`, `NULL` etc., depending on the language).
        timestamp:
          format: double
          description: UTC timestamp of the view portion as ISO8601-1 pattern or UTC epoch time. The default value is the current time.
          oneOf:
          - type: string
          - type: number
        cascadeCreate:
          type: boolean
          description: Sets whether the given user/item should be created if not present in the database.
        recommId:
          type: string
          description: If this view portion is based on a recommendation request, `recommId` is the id of the clicked recommendation.
        additionalData:
          type: object
          description: A dictionary of additional data for the interaction.
        autoPresented:
          type: boolean
          description: Indicates whether the item was automatically presented to the user (e.g., in a swiping feed) or explicitly requested by the user (e.g., by clicking on a link). Defaults to `false`.
        timeSpent:
          type: number
          format: double
          description: The duration (in seconds) that the user viewed the item. In update requests, this value may only increase and is required only if it has changed.
    UpdateMoreItemsParameters:
      type: object
      required:
      - filter
      - changes
      properties:
        filter:
          description: A [ReQL](https://docs.recombee.com/reql) expression, which returns `true` for the items that shall be updated.
          type: string
        changes:
          type: object
          description: A dictionary where the keys are properties that shall be updated.
    UpdateMoreItemsResponse:
      type: object
      required:
      - count
      - itemIds
      properties:
        count:
          type: integer
          description: Number of updated items
        itemIds:
          description: IDs of updated items
          type: array
          items:
            type: string
    DeleteMoreItemsParameters:
      type: object
      required:
      - filter
      properties:
        filter:
          description: A [ReQL](https://docs.recombee.com/reql) expression, which returns `true` for the items that shall be updated.
          type: string
    DeleteMoreItemsResponse:
      type: object
      required:
      - count
      - itemIds
      properties:
        count:
          type: integer
          description: Number of deleted items
        itemIds:
          description: IDs of deleted items
          type: array
          items:
            type: string
    RecommendItemsToUserParameters:
      type: object
      required:
      - count
      properties:
        count:
          description: 'Number of items to be recommended (N for the top-N recommendation).

            '
          type: integer
        scenario:
          description: 'Scenario defines a particular application of recommendations. It can be, for example, "homepage", "cart", or "emailing".


            You can set various settings to the [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com). You can also see the performance of each scenario in the Admin
            UI separately, so you can check how well each application performs.


            The AI that optimizes models to get the best results may optimize different scenarios separately or even use different models in each of the scenarios.

            '
          type: string
        cascadeCreate:
          description: 'If the user does not exist in the database, returns a list of non-personalized recommendations and creates the user in the database. This allows, for example, rotations in the following
            recommendations for that user, as the user will be already known to the system.

            '
          type: boolean
        returnProperties:
          description: "With `returnProperties=true`, property values of the recommended items are returned along with their IDs in a JSON dictionary. The acquired property values can be used to easily\
            \ display the recommended items to the user. \n\nExample response:\n```json\n  {\n    \"recommId\": \"ce52ada4-e4d9-4885-943c-407db2dee837\",\n    \"recomms\": \n      [\n        {\n       \
            \   \"id\": \"tv-178\",\n          \"values\": {\n            \"description\": \"4K TV with 3D feature\",\n            \"categories\":   [\"Electronics\", \"Televisions\"],\n            \"price\"\
            : 342,\n            \"url\": \"myshop.com/tv-178\"\n          }\n        },\n        {\n          \"id\": \"mixer-42\",\n          \"values\": {\n            \"description\": \"Stainless Steel\
            \ Mixer\",\n            \"categories\":   [\"Home & Kitchen\"],\n            \"price\": 39,\n            \"url\": \"myshop.com/mixer-42\"\n          }\n        }\n      ],\n     \"numberNextRecommsCalls\"\
            : 0\n  }\n```\n"
          type: boolean
        includedProperties:
          description: "Allows specifying which properties should be returned when `returnProperties=true` is set. The properties are given as a comma-separated list.\n\nExample response for `includedProperties=description,price`:\n\
            ```json\n  {\n    \"recommId\": \"a86ee8d5-cd8e-46d1-886c-8b3771d0520b\",\n    \"recomms\":\n      [\n        {\n          \"id\": \"tv-178\",\n          \"values\": {\n            \"description\"\
            : \"4K TV with 3D feature\",\n            \"price\": 342\n          }\n        },\n        {\n          \"id\": \"mixer-42\",\n          \"values\": {\n            \"description\": \"Stainless\
            \ Steel Mixer\",\n            \"price\": 39\n          }\n        }\n      ],\n    \"numberNextRecommsCalls\": 0\n  }\n```\n"
          type: array
          items:
            type: string
        filter:
          description: 'Boolean-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to filter recommended items based on the values of their attributes.


            Filters can also be assigned to a [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com).

            '
          type: string
        booster:
          description: 'Number-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to boost the recommendation rate of some items based on the values of their attributes.


            Boosters can also be assigned to a [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com).

            '
          type: string
        logic:
          $ref: '#/components/schemas/Logic'
        reqlExpressions:
          description: "A dictionary of [ReQL](https://docs.recombee.com/reql) expressions that will be executed for each recommended item.\nThis can be used to compute additional properties of the recommended\
            \ items that are not stored in the database.\n\nThe keys are the names of the expressions, and the values are the actual ReQL expressions.\n\nExample request:\n```json\n{\n  \"reqlExpressions\"\
            : {\n    \"isInUsersCity\": \"context_user[\\\"city\\\"] in 'cities'\",\n    \"distanceToUser\": \"earth_distance('location', context_user[\\\"location\\\"])\"\n  }\n}\n```\n\nExample response:\n\
            ```json\n{\n  \"recommId\": \"ce52ada4-e4d9-4885-943c-407db2dee837\",\n  \"recomms\": \n    [\n      {\n        \"id\": \"restaurant-178\",\n        \"reqlEvaluations\": {\n          \"isInUsersCity\"\
            : true,\n          \"distanceToUser\": 5200.2\n        }\n      },\n      {\n        \"id\": \"bar-42\",\n        \"reqlEvaluations\": {\n          \"isInUsersCity\": false,\n          \"distanceToUser\"\
            : 2516.0\n        }\n      }\n    ],\n   \"numberNextRecommsCalls\": 0\n}\n```\n"
          type: object
          additionalProperties:
            type: string
        diversity:
          description: '**Expert option:** Real number from [0.0, 1.0], which determines how mutually dissimilar the recommended items should be. The default value is 0.0, i.e., no diversification. Value
            1.0 means maximal diversification.

            '
          type: number
          format: double
        minRelevance:
          description: '**Expert option:** Specifies the threshold of how relevant must the recommended items be to the user. Possible values one of: "low", "medium", "high". The default value is "low",
            meaning that the system attempts to recommend a number of items equal to *count* at any cost. If there is not enough data (such as interactions or item properties), this may even lead to bestseller-based
            recommendations to be appended to reach the full *count*. This behavior may be suppressed by using "medium" or "high" values. In such a case, the system only recommends items of at least the
            requested relevance and may return less than *count* items when there is not enough data to fulfill it.

            '
          enum:
          - low
          - medium
          - high
          type: string
        rotationRate:
          description: '**Expert option:** If your users browse the system in real-time, it may easily happen that you wish to offer them recommendations multiple times. Here comes the question: how much
            should the recommendations change? Should they remain the same, or should they rotate? Recombee API allows you to control this per request in a backward fashion. You may penalize an item for
            being recommended in the near past. For the specific user, `rotationRate=1` means maximal rotation, `rotationRate=0` means absolutely no rotation. You may also use, for example, `rotationRate=0.2`
            for only slight rotation of recommended items. Default: `0`.

            '
          type: number
          format: double
        rotationTime:
          description: '**Expert option:** Taking *rotationRate* into account, specifies how long it takes for an item to recover from the penalization. For example, `rotationTime=7200.0` means that items
            recommended less than 2 hours ago are penalized. Default: `7200.0`.

            '
          type: number
          format: double
        expertSettings:
          description: 'Dictionary of custom options.

            '
          type: object
        returnAbGroup:
          description: 'If there is a custom AB-testing running, return the name of the group to which the request belongs.

            '
          type: boolean
    RecommendUsersToUserParameters:
      type: object
      required:
      - count
      properties:
        count:
          description: Number of users to be recommended (N for the top-N recommendation).
          type: integer
        scenario:
          description: 'Scenario defines a particular application of recommendations. It can be, for example, "homepage", "cart", or "emailing".


            You can set various settings to the [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com). You can also see the performance of each scenario in the Admin
            UI separately, so you can check how well each application performs.


            The AI that optimizes models to get the best results may optimize different scenarios separately or even use different models in each of the scenarios.

            '
          type: string
        cascadeCreate:
          description: If the user does not exist in the database, returns a list of non-personalized recommendations and creates the user in the database. This allows, for example, rotations in the following
            recommendations for that user, as the user will be already known to the system.
          type: boolean
        returnProperties:
          description: "With `returnProperties=true`, property values of the recommended users are returned along with their IDs in a JSON dictionary. The acquired property values can be used to easily\
            \ display the recommended users. \n\nExample response:\n```json\n  {\n    \"recommId\": \"9cb9c55d-50ba-4478-84fd-ab456136156e\",\n    \"recomms\": \n      [\n        {\n          \"id\": \"\
            user-17\",\n          \"values\": {\n            \"country\": \"US\",\n            \"sex\": \"F\"\n          }\n        },\n        {\n          \"id\": \"user-2\",\n          \"values\": {\n\
            \            \"country\": \"CAN\",\n            \"sex\": \"M\"\n          }\n        }\n      ],\n    \"numberNextRecommsCalls\": 0\n  }\n```\n"
          type: boolean
        includedProperties:
          description: "Allows specifying which properties should be returned when `returnProperties=true` is set. The properties are given as a comma-separated list.\n\nExample response for `includedProperties=country`:\n\
            ```json\n  {\n    \"recommId\": \"b326d82d-5d57-4b45-b362-c9d6f0895855\",\n    \"recomms\":\n      [\n        {\n          \"id\": \"user-17\",\n          \"values\": {\n            \"country\"\
            : \"US\"\n          }\n        },\n        {\n          \"id\": \"user-2\",\n          \"values\": {\n            \"country\": \"CAN\"\n          }\n        }\n      ],\n    \"numberNextRecommsCalls\"\
            : 0\n  }\n```\n"
          type: array
          items:
            type: string
        filter:
          description: 'Boolean-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to filter recommended users based on the values of their attributes.


            Filters can also be assigned to a [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com).

            '
          type: string
        booster:
          description: 'Number-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to boost the recommendation rate of some users based on the values of their attributes.


            Boosters can also be assigned to a [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com).

            '
          type: string
        logic:
          $ref: '#/components/schemas/Logic'
        reqlExpressions:
          description: "A dictionary of [ReQL](https://docs.recombee.com/reql) expressions that will be executed for each recommended user.\nThis can be used to compute additional properties of the recommended\
            \ users that are not stored in the database.\n\nThe keys are the names of the expressions, and the values are the actual ReQL expressions.\n\nExample request:\n```json\n{\n  \"reqlExpressions\"\
            : {\n    \"isInUsersCity\": \"context_user[\\\"city\\\"] in 'cities'\",\n    \"distanceToUser\": \"earth_distance('location', context_user[\\\"location\\\"])\"\n  }\n}\n```\n\nExample response:\n\
            ```json\n{\n  \"recommId\": \"ce52ada4-e4d9-4885-943c-407db2dee837\",\n  \"recomms\": \n    [\n      {\n        \"id\": \"restaurant-178\",\n        \"reqlEvaluations\": {\n          \"isInUsersCity\"\
            : true,\n          \"distanceToUser\": 5200.2\n        }\n      },\n      {\n        \"id\": \"bar-42\",\n        \"reqlEvaluations\": {\n          \"isInUsersCity\": false,\n          \"distanceToUser\"\
            : 2516.0\n        }\n      }\n    ],\n   \"numberNextRecommsCalls\": 0\n}\n```\n"
