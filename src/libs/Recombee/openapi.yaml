      - name: itemId
        in: path
        description: ID of the item for which the recommendations are to be generated.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendItemsToItemParameters'
        description: Recommendation parameters definition
        required: true
      responses:
        '200':
