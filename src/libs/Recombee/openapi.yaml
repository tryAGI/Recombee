            '
          type: boolean
    RecommendItemsToItemParameters:
      type: object
      required:
      - targetUserId
      - count
      properties:
        targetUserId:
          description: "ID of the user who will see the recommendations.\n\nSpecifying the *targetUserId* is beneficial because:\n\n* It makes the recommendations personalized\n* Allows the calculation\
            \ of Actions and Conversions\n  in the graphical user interface,\n  as Recombee can pair the user who got recommendations\n  and who afterward viewed/purchased an item.\n\nIf you insist on not\
            \ specifying the user, pass `null`\n(`None`, `nil`, `NULL` etc., depending on the language) to *targetUserId*.\nDo not create some special dummy user for getting recommendations,\nas it could\
            \ mislead the recommendation models,\nand result in wrong recommendations.\n\nFor anonymous/unregistered users, it is possible to use, for example, their session ID.\n"
          type: string
        count:
          description: Number of items to be recommended (N for the top-N recommendation).
          type: integer
        scenario:
          description: 'Scenario defines a particular application of recommendations. It can be, for example, "homepage", "cart", or "emailing".


            You can set various settings to the [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com). You can also see the performance of each scenario in the Admin
            UI separately, so you can check how well each application performs.


            The AI that optimizes models to get the best results may optimize different scenarios separately or even use different models in each of the scenarios.

            '
          type: string
        cascadeCreate:
          description: If an item of the given *itemId* or user of the given *targetUserId* doesn't exist in the database, it creates the missing entity/entities and returns some (non-personalized) recommendations.
            This allows, for example, rotations in the following recommendations for the user of the given *targetUserId*, as the user will be already known to the system.
          type: boolean
        returnProperties:
          description: "With `returnProperties=true`, property values of the recommended items are returned along with their IDs in a JSON dictionary. The acquired property values can be used to easily\
            \ display the recommended items to the user. \n\nExample response:\n```json\n  {\n    \"recommId\": \"0c6189e7-dc1a-429a-b613-192696309361\",\n    \"recomms\":\n      [\n        {\n        \
            \  \"id\": \"tv-178\",\n          \"values\": {\n            \"description\": \"4K TV with 3D feature\",\n            \"categories\":   [\"Electronics\", \"Televisions\"],\n            \"price\"\
            : 342,\n            \"url\": \"myshop.com/tv-178\"\n          }\n        },\n        {\n          \"id\": \"mixer-42\",\n          \"values\": {\n            \"description\": \"Stainless Steel\
            \ Mixer\",\n            \"categories\":   [\"Home & Kitchen\"],\n            \"price\": 39,\n            \"url\": \"myshop.com/mixer-42\"\n          }\n        }\n      ],\n    \"numberNextRecommsCalls\"\
            : 0\n  }\n```\n"
          type: boolean
        includedProperties:
          description: "Allows specifying which properties should be returned when `returnProperties=true` is set. The properties are given as a comma-separated list.\n\nExample response for `includedProperties=description,price`:\n\
            ```json\n  {\n    \"recommId\": \"6842c725-a79f-4537-a02c-f34d668a3f80\",\n    \"recomms\": \n      [\n        {\n          \"id\": \"tv-178\",\n          \"values\": {\n            \"description\"\
            : \"4K TV with 3D feature\",\n            \"price\": 342\n          }\n        },\n        {\n          \"id\": \"mixer-42\",\n          \"values\": {\n            \"description\": \"Stainless\
            \ Steel Mixer\",\n            \"price\": 39\n          }\n        }\n      ],\n    \"numberNextRecommsCalls\": 0\n  }\n```\n"
          type: array
          items:
            type: string
        filter:
          description: 'Boolean-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to filter recommended items based on the values of their attributes.


            Filters can also be assigned to a [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com).

            '
          type: string
        booster:
          description: 'Number-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to boost the recommendation rate of some items based on the values of their attributes.


            Boosters can also be assigned to a [scenario](https://docs.recombee.com/scenarios) in the [Admin UI](https://admin.recombee.com).

            '
          type: string
        logic:
          $ref: '#/components/schemas/Logic'
        reqlExpressions:
          description: "A dictionary of [ReQL](https://docs.recombee.com/reql) expressions that will be executed for each recommended item.\nThis can be used to compute additional properties of the recommended\
            \ items that are not stored in the database.\n\nThe keys are the names of the expressions, and the values are the actual ReQL expressions.\n\nExample request:\n```json\n{\n  \"reqlExpressions\"\
            : {\n    \"isInUsersCity\": \"context_user[\\\"city\\\"] in 'cities'\",\n    \"distanceToUser\": \"earth_distance('location', context_user[\\\"location\\\"])\",\n    \"isFromSameCompany\": \"\
            'company' == context_item[\\\"company\\\"]\"\n  }\n}\n```\n\nExample response:\n```json\n{\n  \"recommId\": \"ce52ada4-e4d9-4885-943c-407db2dee837\",\n  \"recomms\": \n    [\n      {\n     \
            \   \"id\": \"restaurant-178\",\n        \"reqlEvaluations\": {\n          \"isInUsersCity\": true,\n          \"distanceToUser\": 5200.2,\n          \"isFromSameCompany\": false\n        }\n\
            \      },\n      {\n        \"id\": \"bar-42\",\n        \"reqlEvaluations\": {\n          \"isInUsersCity\": false,\n          \"distanceToUser\": 2516.0,\n          \"isFromSameCompany\":\
            \ true\n        }\n      }\n    ],\n   \"numberNextRecommsCalls\": 0\n}\n```\n"
          type: object
          additionalProperties:
            type: string
        userImpact:
          description: '**Expert option:** If *targetUserId* parameter is present, the recommendations are biased towards the given user. Using *userImpact*, you may control this bias. For an extreme case
            of `userImpact=0.0`, the interactions made by the user are not taken into account at all (with the exception of history-based blacklisting), for `userImpact=1.0`, you''ll get a user-based recommendation.
            The default value is `0`.

            '
          type: number
          format: double
        diversity:
          description: '**Expert option:** Real number from [0.0, 1.0], which determines how mutually dissimilar the recommended items should be. The default value is 0.0, i.e., no diversification. Value
            1.0 means maximal diversification.

            '
          type: number
          format: double
        minRelevance:
          description: '**Expert option:** If the *targetUserId* is provided:  Specifies the threshold of how relevant must the recommended items be to the user. Possible values one of: "low", "medium",
            "high". The default value is "low", meaning that the system attempts to recommend a number of items equal to *count* at any cost. If there is not enough data (such as interactions or item properties),
            this may even lead to bestseller-based recommendations being appended to reach the full *count*. This behavior may be suppressed by using "medium" or "high" values. In such case, the system
            only recommends items of at least the requested relevance and may return less than *count* items when there is not enough data to fulfill it.

            '
          enum:
          - low
          - medium
          - high
          type: string
        rotationRate:
          description: '**Expert option:** If the *targetUserId* is provided: If your users browse the system in real-time, it may easily happen that you wish to offer them recommendations multiple times.
            Here comes the question: how much should the recommendations change? Should they remain the same, or should they rotate? Recombee API allows you to control this per request in a backward fashion.
            You may penalize an item for being recommended in the near past. For the specific user, `rotationRate=1` means maximal rotation, `rotationRate=0` means absolutely no rotation. You may also use,
            for example, `rotationRate=0.2` for only slight rotation of recommended items.

