                    numberNextRecommsCalls: 0
        '400':
          description: itemId does not match ^[a-zA-Z0-9_\-:@\.]+$, count is not a positive integer, filter or booster is not valid [ReQL](https://docs.recombee.com/reql) expressions, filter expression
