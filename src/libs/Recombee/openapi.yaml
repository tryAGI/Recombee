  /{databaseId}/recomms/next/items/{recommId}:
    post:
      summary: Recommend Next Items
      description: "Returns items that shall be shown to a user as next recommendations when the user e.g. scrolls the page down (*infinite scroll*) or goes to the next page.\n\nIt accepts `recommId` of\
        \ a base recommendation request (e.g., request from the first page) and the number of items that shall be returned (`count`).\nThe base request can be one of:\n  - [Recommend Items to Item](https://docs.recombee.com/api#recommend-items-to-item)\n\
        \  - [Recommend Items to User](https://docs.recombee.com/api#recommend-items-to-user)\n  - [Recommend Items to Item Segment](https://docs.recombee.com/api#recommend-items-to-item-segment)\n  - [Search\
        \ Items](https://docs.recombee.com/api#search-items)\n\nAll the other parameters are inherited from the base request.\n\n*Recommend next items* can be called many times for a single `recommId` and\
        \ each call returns different (previously not recommended) items.\nThe number of *Recommend next items* calls performed so far is returned in the `numberNextRecommsCalls` field.\n\n*Recommend next\
        \ items* can be requested up to 30 minutes after the base request or a previous *Recommend next items* call.\n\nFor billing purposes, each call to *Recommend next items* is counted as a separate\
        \ recommendation request.\n"
      tags:
      - Recommendations
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: recommId
        in: path
        description: ID of the base recommendation request for which next recommendations should be returned
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecommendNextItemsParameters'
        description: Recommendation parameters definition
        required: true
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecommendationResponse'
              examples:
                response:
                  value:
                    recommId: 768448ea-10b3-4028-bb76-4b2f95121d19
                    recomms:
                    - id: item-176
                    - id: item-141
                    - id: item-967
                    numberNextRecommsCalls: 4
        '400':
          description: Parameter `count` is not given or is not a positive integer. Parameter `recommId` is not an UUID.
        '404':
          description: Base request with the given `recommId` does not exist or has expired.
