        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: userId
        in: path
        description: 'ID of the user whose properties are to be obtained.

          '
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                response:
                  value:
                    country: US
                    sex: F
        '400':
          description: The *userId* does not match ^[a-zA-Z0-9_\-:@\.]+$
        '404':
          description: 'User of the given *userId* is not present in the catalog. If there is no additional info in the JSON response, you probably have an error in your URL.

            '
  /{databaseId}/users/{targetUserId}/merge/{sourceUserId}:
    put:
      summary: Merge Users
      description: 'Merges interactions (purchases, ratings, bookmarks, detail views ...) of two different users under a single user ID. This is especially useful for online e-commerce applications working
        with anonymous users identified by unique tokens such as the session ID. In such applications, it may often happen that a user owns a persistent account, yet accesses the system anonymously while,
        e.g., putting items into a shopping cart. At some point in time, such as when the user wishes to confirm the purchase, (s)he logs into the system using his/her username and password. The interactions
        made under anonymous session ID then become connected with the persistent account, and merging these two becomes desirable.



        Merging happens between two users referred to as the *target* and the *source*. After the merge, all the interactions of the source user are attributed to the target user, and the source user is
        **deleted**.


        By default, the *Merge Users* request is only available from server-side integrations for security reasons, to prevent potential abuse.

        If you need to call this request from a client-side environment (such as a web or mobile app), please contact our support and request access to enable this feature for your database.

        '
      tags:
      - Users
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: targetUserId
        in: path
        description: ID of the target user.
        required: true
        schema:
          type: string
      - name: sourceUserId
        in: path
        description: ID of the source user.
        required: true
        schema:
          type: string
      - name: cascadeCreate
        in: query
        description: Sets whether the user *targetUserId* should be created if not present in the database.
        required: false
        schema:
          type: boolean
      responses:
        '201':
          description: Successful operation.
        '400':
          description: The *sourceUserId* or *targetUserId* does not match ^[a-zA-Z0-9_\-:@\.]+$
        '404':
          description: The *sourceUserId* or *targetUserId* does not exist in the database. If there is no additional info in the JSON response, you probably have an error in your URL.
  /{databaseId}/users/list/:
    get:
      summary: List Users
      description: Gets a list of IDs of users currently present in the catalog.
      tags:
      - Users
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: filter
        in: query
        description: Boolean-returning [ReQL](https://docs.recombee.com/reql) expression, which allows you to filter users to be listed. Only the users for which the expression is *true* will be returned.
        required: false
        schema:
          type: string
      - name: count
        in: query
        description: The number of users to be listed.
        required: false
        schema:
          type: integer
      - name: offset
        in: query
        description: Specifies the number of users to skip (ordered by `userId`).
        required: false
        schema:
          type: integer
      - name: returnProperties
        in: query
        description: "With `returnProperties=true`, property values of the listed users are returned along with their IDs in a JSON dictionary. \n\nExample response:\n```json\n  [\n    {\n      \"userId\"\
          : \"user-81\",\n      \"country\": \"US\",\n      \"sex\": \"M\"\n    },\n    {\n      \"userId\": \"user-314\",\n      \"country\": \"CAN\",\n      \"sex\": \"F\"\n    }\n  ]\n```\n"
        required: false
        schema:
          type: boolean
      - name: includedProperties
        in: query
        description: "Allows specifying which properties should be returned when `returnProperties=true` is set. The properties are given as a comma-separated list.\n\nExample response for `includedProperties=country`:\n\
          ```json\n  [\n    {\n      \"userId\": \"user-81\",\n      \"country\": \"US\"\n    },\n    {\n      \"userId\": \"user-314\",\n      \"country\": \"CAN\"\n    }\n  ]\n```\n"
        required: false
        style: form
        explode: false
        schema:
          type: array
          items:
            type: string
      responses:
        '200':
          description: Successful operation.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              examples:
                response:
                  value:
                  - user-1
                  - user-2
                  - user-3
        '404':
          description: Invalid URL.
  /{databaseId}/users/properties/{propertyName}:
    put:
      summary: Add User Property
      description: 'Adding a user property is somewhat equivalent to adding a column to the table of users. The users may be characterized by various properties of different types.

        '
      tags:
      - User Properties
      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: propertyName
        in: path
        description: 'Name of the user property to be created. Currently, the following names are reserved: `id`, `userid`, case-insensitively. Also, the length of the property name must not exceed 63 characters.

          '
        required: true
        schema:
          type: string
      - name: type
        in: query
        description: 'Value type of the user property to be created. One of: `int`, `double`, `string`, `boolean`, `timestamp`, `set`.


          * `int` - Signed integer number.


          * `double` - Floating point number. It uses 64-bit base-2 format (IEEE 754 standard).


          * `string` - UTF-8 string.


          * `boolean` - *true* / *false*


          * `timestamp` - Value representing date and time.


          * `set` - Set of strings.

          '
        required: true
        schema:
          type: string
          enum:
          - int
          - double
          - string
          - boolean
          - timestamp
          - set
      responses:
        '201':
          description: Successful operation.
        '400':
          description: 'Property name does not match ^[a-zA-Z0-9_\-:]+$, or it is a reserved keyword (''''id'''', ''''userid''''), or its length exceeds 63 characters. Type information is missing, or the
            given type is invalid.

            '
        '409':
          description: Property of the given name is already present in the database. In many cases, you may consider this code a success – it only tells you that nothing has been written to the database.
    delete:
      summary: Delete User Property
      description: 'Deleting a user property is roughly equivalent to removing a column from the table of users.

