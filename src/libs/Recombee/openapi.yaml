      parameters:
      - name: databaseId
        in: path
        description: ID of your database.
        required: true
        schema:
          type: string
      - name: userId
        in: path
        description: ID of the user for whom personalized search will be performed.
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
